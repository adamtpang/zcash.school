<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
    <div>
      <div class="eyebrow" style="margin-bottom:8px;">Editorial card (light)</div>
      <div style="display:flex; gap:8px;">
        <div style="flex:1; background:#FFFFFF; border:1px solid #E6E8EE; border-radius:8px; padding:14px;">
          <div style="color:#16181D; font-size:13px; font-weight:700;">Body</div>
          <div style="color:#3A3D47; font-size:12px;">Lede</div>
          <div style="color:#5F636E; font-size:11px;">Meta</div>
          <a style="color:#E5322D; font-size:12px; font-weight:600;">Link · red</a>
        </div>
      </div>
    </div>
    <div>
      <div class="eyebrow" style="margin-bottom:8px; color:#828690;">Splash / dark</div>
      <div style="display:flex; gap:8px;">
        <div style="flex:1; background:#0C0D10; border:1px solid #21232B; border-radius:8px; padding:14px;">
          <div style="color:#FAFAFB; font-size:13px; font-weight:700;">Body</div>
          <div style="color:#B6B8C0; font-size:12px;">Lede</div>
          <div style="color:#828690; font-size:11px;">Meta</div>
          <a style="color:#F4B728; font-size:12px; font-weight:600;">Link · yellow</a>
        </div>
      </div>
    </div>
  </div>
  <div style="margin-top:10px; font-size:11px; color:var(--zs-gray-3);">Light: red = link + action. Dark: yellow = link, red = action.</div>
</div></body></html>
