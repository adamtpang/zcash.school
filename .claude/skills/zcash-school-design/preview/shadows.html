<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
  <div style="display:flex; gap:18px; padding:14px 4px 22px;">
    <div style="flex:1; display:flex; flex-direction:column; gap:8px; align-items:center;">
      <div style="width:120px; height:80px; background:#FFFFFF; border-radius:12px; box-shadow:0 14px 40px rgba(12,13,16,0.22), 0 2px 6px rgba(12,13,16,0.12);"></div>
      <div style="font-size:12px; font-weight:600;">Editorial card</div>
      <div class="mono hint">0 14px 40px / 0 2px 6px</div>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; gap:8px; align-items:center;">
      <div style="width:120px; height:80px; background:#FFFFFF; border-radius:12px; box-shadow:0 14px 40px rgba(12,13,16,0.18);"></div>
      <div style="font-size:12px; font-weight:600;">Sidebar</div>
      <div class="mono hint">0 14px 40px / .18</div>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; gap:8px; align-items:center;">
      <div style="width:120px; height:80px; background:#FFFFFF; border-radius:12px; box-shadow:0 8px 24px rgba(12,13,16,0.14);"></div>
      <div style="font-size:12px; font-weight:600;">TOC margin note</div>
      <div class="mono hint">0 8px 24px / .14</div>
    </div>
  </div>
</div></body></html>
