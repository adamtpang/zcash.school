<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
  <div style="display:flex; gap:14px;">
    
  <div style="flex:1; display:flex; flex-direction:column; gap:6px;">
    <div style="height:64px; background:#0C0D10; border-radius:8px; border:1px solid rgba(0,0,0,.06);"></div>
    <div style="font-size:12px; font-weight:600;">Near-Black (page / OG)</div>
    <div class="mono hint" style="font-size:11px;">#0C0D10</div>
  </div>
    
  <div style="flex:1; display:flex; flex-direction:column; gap:6px;">
    <div style="height:64px; background:#16181D; border-radius:8px; border:1px solid rgba(0,0,0,.06);"></div>
    <div style="font-size:12px; font-weight:600;">Ink (body text)</div>
    <div class="mono hint" style="font-size:11px;">#16181D</div>
  </div>
    
  <div style="flex:1; display:flex; flex-direction:column; gap:6px;">
    <div style="height:64px; background:#FFFFFF; border-radius:8px; border:1px solid rgba(0,0,0,.06);"></div>
    <div style="font-size:12px; font-weight:600;">White (editorial card)</div>
    <div class="mono hint" style="font-size:11px;">#FFFFFF</div>
  </div>
    
  <div style="flex:1; display:flex; flex-direction:column; gap:6px;">
    <div style="height:64px; background:#FAFAFB; border-radius:8px; border:1px solid rgba(0,0,0,.06);"></div>
    <div style="font-size:12px; font-weight:600;">Off-White (UI white)</div>
    <div class="mono hint" style="font-size:11px;">#FAFAFB</div>
  </div>
    
  <div style="flex:1; display:flex; flex-direction:column; gap:6px;">
    <div style="height:64px; background:#FBF3E4; border-radius:8px; border:1px solid rgba(0,0,0,.06);"></div>
    <div style="font-size:12px; font-weight:600;">Cream (zebra base)</div>
    <div class="mono hint" style="font-size:11px;">#FBF3E4</div>
  </div>
  </div>
</div></body></html>
