<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap"></head><body><div class="card">
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px;">

        <span class="mono hint">500</span><span style="font-weight:500;">Medium · eyebrow</span>
        <span class="mono hint">600</span><span style="font-weight:600;">Semibold · h2/h3</span>
        <span class="mono hint">700</span><span style="font-weight:700;">Bold · h1 / display</span>
      </div>
    </div>
    <div>
      <div class="eyebrow" style="margin-bottom:8px;">Inter · body & UI</div>
      <div style="display:grid; grid-template-columns:auto 1fr; gap:4px 14px; align-items:baseline; font-family:'Inter', sans-serif; font-size:16px;">
        <span class="mono hint">400</span><span style="font-weight:400;">Regular · body</span>
        <span class="mono hint">500</span><span style="font-weight:500;">Medium · lede</span>
        <span class="mono hint">600</span><span style="font-weight:600;">Semibold · button</span>
        <span class="mono hint">700</span><span style="font-weight:700;">Bold · active nav</span>
      </div>
    </div>
  </div>
</div></body></html>
