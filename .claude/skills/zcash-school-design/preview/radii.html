<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
  <div style="display:flex; gap:14px; align-items:flex-end;">
    
      <div style="flex:1; display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:64px; height:64px; background:#FFFFFF; border:1px solid #E6E8EE; border-radius:3px;"></div>
        <div style="font-size:12px; font-weight:600;">3px</div>
        <div class="mono hint" style="font-size:11px;">--r-mark</div>
      </div>
      <div style="flex:1; display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:64px; height:64px; background:#FFFFFF; border:1px solid #E6E8EE; border-radius:6px;"></div>
        <div style="font-size:12px; font-weight:600;">6px</div>
        <div class="mono hint" style="font-size:11px;">--r-button</div>
      </div>
      <div style="flex:1; display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:64px; height:64px; background:#FFFFFF; border:1px solid #E6E8EE; border-radius:8px;"></div>
        <div style="font-size:12px; font-weight:600;">8px</div>
        <div class="mono hint" style="font-size:11px;">--r-chip</div>
      </div>
      <div style="flex:1; display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:64px; height:64px; background:#FFFFFF; border:1px solid #E6E8EE; border-radius:10px;"></div>
        <div style="font-size:12px; font-weight:600;">10px</div>
        <div class="mono hint" style="font-size:11px;">--r-tile</div>
      </div>
      <div style="flex:1; display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:64px; height:64px; background:#FFFFFF; border:1px solid #E6E8EE; border-radius:12px;"></div>
        <div style="font-size:12px; font-weight:600;">12px</div>
        <div class="mono hint" style="font-size:11px;">--r-panel</div>
      </div>
      <div style="flex:1; display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:64px; height:64px; background:#FFFFFF; border:1px solid #E6E8EE; border-radius:16px;"></div>
        <div style="font-size:12px; font-weight:600;">16px</div>
        <div class="mono hint" style="font-size:11px;">--r-card</div>
      </div>
      <div style="flex:1; display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:64px; height:64px; background:#FFFFFF; border:1px solid #E6E8EE; border-radius:999px;"></div>
        <div style="font-size:12px; font-weight:600;">999</div>
        <div class="mono hint" style="font-size:11px;">--r-pill</div>
      </div>
  </div>
</div></body></html>
