<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
  <div style="display:flex; gap:36px; align-items:center;">
    <div style="display:flex; gap:0;">
      <div style="width:60px; height:60px; background:#F4B728; border-radius:14px;"></div>
      <div style="width:60px; height:60px; background:#E5322D; border-radius:14px; margin-left:8px;"></div>
    </div>
    <div style="display:flex; gap:0;">
      <div style="width:30px; height:30px; background:#F4B728; border-radius:7px;"></div>
      <div style="width:30px; height:30px; background:#E5322D; border-radius:7px; margin-left:4px;"></div>
    </div>
    <div style="display:flex; gap:0;">
      <div style="width:14px; height:14px; background:#F4B728; border-radius:3px;"></div>
      <div style="width:14px; height:14px; background:#E5322D; border-radius:3px; margin-left:2px;"></div>
    </div>
    <div class="hint" style="max-width:200px;">Identity mark — two squares. Yellow then red, ~12% gap, rx scales with size.</div>
  </div>
</div></body></html>
