<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
  <div style="display:flex; gap:14px; flex-wrap:wrap; align-items:center;">
    <button style="background:#E5322D; border:1px solid #E5322D; color:#fff; font-weight:650; font-family:var(--font-sans); padding:10px 18px; border-radius:6px; font-size:14px;">Start Learning →</button>
    <button style="background:transparent; border:1px solid #9AA0AC; color:#16181D; font-family:var(--font-sans); padding:10px 18px; border-radius:6px; font-size:14px; font-weight:600;">Skip to Using Zcash ↗</button>
    <button style="background:transparent; border:0; color:#16181D; font-family:var(--font-sans); padding:10px 4px; border-radius:6px; font-size:14px; font-weight:600;">minimal</button>
  </div>
  <div style="display:flex; gap:14px; flex-wrap:wrap; align-items:center; margin-top:12px;">
    <button style="background:#C2241F; border:1px solid #C2241F; color:#fff; font-weight:650; font-family:var(--font-sans); padding:10px 18px; border-radius:6px; font-size:14px; transform:translateY(-1px);">Hover state</button>
    <div class="hint">primary · secondary · minimal · primary:hover (red → red-hover, translateY -1px)</div>
  </div>
</div></body></html>
